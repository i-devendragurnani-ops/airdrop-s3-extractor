version: "2"

name: S3 Test Artifacts
description: Import test execution reports from AWS S3 into DevRev.

service_account:
  display_name: S3 Test Artifacts Bot

functions:
  - name: extraction
    description: Extraction function for S3 test execution reports
  - name: loading
    description: Loading function for S3 test data

keyring_types:
  - id: s3-connection
    name: S3 Connection
    description: Connection to AWS S3 for reading test execution artifacts.
    kind: "Secret"
    is_subdomain: false
    external_system_name: "AWS S3"
    secret_config:
      secret_transform: "tojson"
      fields:
        - id: access_key_id
          name: AWS Access Key ID
          description: AWS Access Key ID with read access to the S3 bucket
        - id: secret_access_key
          name: AWS Secret Access Key
          description: AWS Secret Access Key corresponding to the Access Key ID
        - id: session_token
          name: AWS Session Token
          description: AWS Session Token for temporary/SSO credentials (optional for long-lived IAM keys)
          is_optional: true
      token_verification:
        url: "https://ip-ranges.amazonaws.com/ip-ranges.json"
        method: GET
    organization_data:
      type: "config"
      url: "https://ip-ranges.amazonaws.com/ip-ranges.json"
      method: "GET"
      response_jq: '{"id": "s3-artifacts-org", "name": "AWS S3 Test Artifacts"}'

imports:
  - slug: s3-test-artifacts
    display_name: S3 Test Artifacts
    description: Import test execution reports from AWS S3
    extractor_function: extraction
    loader_function: loading
    allowed_connection_types:
      - s3-connection
